spring:
  web:
    resources:
      add-mappings: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        JDBC:
          time_zone: Asia/Ho_Chi_Minh

  jackson:
    time-zone: Asia/Ho_Chi_Minh

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: ${JWT_ACCESS_EXPIRATION}
    refresh-token-expiration: ${JWT_REFRESH_EXPIRATION}
  cookie:
    secure: false
    same-site: Lax
  async:
    mail:
      core-pool-size: 2
      max-pool-size: 4
      queue-capacity: 200
    ticket-qr:
      core-pool-size: 2
      max-pool-size: 4
      queue-capacity: 200
  payment:
    qr-url: ${PAYMENT_QR_URL:}
    receiver-name: ${PAYMENT_RECEIVER_NAME:}
  mail:
    enabled: false
    from: no-reply@e-ticket.local
    subject-prefix: "[E-Ticket]"
    template-path: classpath:templates/mail/payment-confirmed.html
    date-time-pattern: yyyy-MM-dd HH:mm
    ticket-template-path: classpath:templates/mail/payment-tickets.html
